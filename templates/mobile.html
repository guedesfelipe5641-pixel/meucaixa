<!-- ╔══════════════════════════════════════════════════════════════════╗
     ║  MeuCaixa · templates/mobile.html · v3.0                        ║
     ║  Shell mobile — layout estático (injetado no #shell)            ║
     ║  Requer: theme.js (--primary / --accent no :root)               ║
     ╚══════════════════════════════════════════════════════════════════╝ -->

<style>
  /* ── Escopo do shell mobile ────────────────────────────────────── */
  #mc-mobile {
    box-sizing: border-box;
  }
  #mc-mobile input,
  #mc-mobile button,
  #mc-mobile select,
  #mc-mobile textarea {
    font-family: inherit;
  }

  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap');

  /* ── Banners fixos (ocultos por padrão) ───────────────────────── */
  .mc-banner {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    position: relative;
    z-index: 200;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .mc-banner.visivel { display: flex; }
  .mc-banner a {
    font-weight: 700;
    text-decoration: none;
    border-radius: 5px;
    padding: 3px 10px;
    white-space: nowrap;
    margin-left: auto;
    font-size: 11px;
    transition: opacity .15s;
  }
  .mc-banner a:hover { opacity: .82; }

  #banner-offline    { background: #37474F; color: #fff; }
  #banner-offline a  { background: #fff; color: #37474F; }

  #banner-trial      { background: #1565C0; color: #fff; }
  #banner-trial a    { background: #fff; color: #1565C0; }

  #banner-expirado   { background: #F57F17; color: #fff; }
  #banner-expirado a { background: #fff; color: #F57F17; }

  #banner-suspenso   { background: #C62828; color: #fff; }

  #banner-manutencao { background: #4A148C; color: #fff; }

  /* ── Container raiz mobile ─────────────────────────────────────── */
  #mc-mobile {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh; /* dynamic viewport height — iOS */
    font-family: 'DM Sans', sans-serif;
    background: #f8f5f2;
    overflow: hidden;
  }

  /* ── Header 52px ───────────────────────────────────────────────── */
  #mc-header-mobile {
    flex-shrink: 0;
    height: calc(52px + env(safe-area-inset-top, 0px));
    background: var(--primary, #6B3520);
    color: #fff;
    display: flex;
    align-items: center;
    padding-top: env(safe-area-inset-top, 0px);
    padding-left: 14px;
    padding-right: 14px;
    gap: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,.18);
    z-index: 100;
  }
  #mc-logo-mobile {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
  }
  #mc-logo-mobile img {
    width: 28px;
    height: 28px;
    border-radius: 5px;
    object-fit: cover;
  }
  #mc-logo-texto-mobile {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: #fff;
  }

  /* Badge de conexão mobile (compacto) */
  #mc-badge-conexao {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 12px;
    flex-shrink: 0;
    transition: background .3s, color .3s;
  }
  #mc-badge-conexao.online  { background: rgba(255,255,255,.18); color: #fff; }
  #mc-badge-conexao.offline { background: #C62828; color: #fff; }

  /* Sino mobile */
  #sino-container {
    position: relative;
    flex-shrink: 0;
  }

  /* Avatar mobile (compacto) */
  #mc-avatar-mobile {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,.20);
    border: 1px solid rgba(255,255,255,.35);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-family: 'DM Sans', sans-serif;
    border: none;
  }

  /* ── Área de conteúdo (flex-1) ─────────────────────────────────── */
  #conteudo-principal {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    background: #f8f5f2;
    padding-bottom: 16px;
    position: relative;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Tab bar 60px ─────────────────────────────────────────────── */
  #mc-tab-bar {
    flex-shrink: 0;
    height: calc(60px + env(safe-area-inset-bottom, 0px));
    background: #fff;
    border-top: 1px solid #e8e0d8;
    display: flex;
    align-items: flex-start;
    padding-top: 0;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    box-shadow: 0 -2px 8px rgba(0,0,0,.08);
  }
  .mc-tab-item {
    flex: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    color: #999;
    transition: color .15s;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    position: relative;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .mc-tab-item.ativo { color: var(--primary, #6B3520); }
  .mc-tab-item.ativo::after {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 3px;
    background: var(--primary, #6B3520);
    border-radius: 0 0 3px 3px;
  }
  .mc-tab-icone {
    font-size: 22px;
    line-height: 1;
  }
  .mc-tab-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .4px;
    display: none; /* labels ocultos, só ícones */
  }

  /* ── Drawer lateral (oculto por padrão) ──────────────────────── */
  #mc-drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 300;
    -webkit-tap-highlight-color: transparent;
  }
  #mc-drawer-overlay.aberto { display: block; }

  #mc-drawer {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 280px;
    background: #fff;
    z-index: 301;
    transform: translateX(100%);
    transition: transform .28s cubic-bezier(.25,.8,.5,1);
    display: flex;
    flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    box-shadow: -4px 0 24px rgba(0,0,0,.15);
    overflow-y: auto;
  }
  #mc-drawer-overlay.aberto #mc-drawer {
    transform: translateX(0);
  }

  /* Cabeçalho do drawer */
  #mc-drawer-header {
    background: var(--primary, #6B3520);
    color: #fff;
    padding: 20px 16px 14px;
    flex-shrink: 0;
  }
  #mc-drawer-nome { font-size: 14px; font-weight: 700; }
  #mc-drawer-empresa { font-size: 12px; color: rgba(255,255,255,.70); margin-top: 3px; }

  /* Botão fechar drawer */
  #mc-drawer-fechar {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(255,255,255,.18);
    border: none;
    color: #fff;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  /* Itens do drawer */
  #mc-drawer-menu {
    flex: 1;
    padding: 8px 0;
    list-style: none;
  }
  .mc-drawer-separator { height: 1px; background: #f0ebe4; margin: 6px 12px; }
  .mc-drawer-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 500;
    color: #444;
    cursor: pointer;
    transition: background .1s, color .1s;
    text-decoration: none;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .mc-drawer-item:hover, .mc-drawer-item.ativo {
    background: #f8f5f2;
    color: var(--primary, #6B3520);
  }
  .mc-drawer-icon { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }
  .mc-drawer-pro-badge {
    margin-left: auto;
    font-size: 9px;
    font-weight: 700;
    background: var(--accent, #F0A335);
    color: #fff;
    border-radius: 4px;
    padding: 1px 5px;
    letter-spacing: .4px;
  }

  /* Footer do drawer */
  #mc-drawer-footer {
    padding: 12px 16px;
    border-top: 1px solid #f0ebe4;
    flex-shrink: 0;
  }
  #mc-drawer-logout {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 10px 0;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #C62828;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
</style>

<!-- ── Shell mobile ─────────────────────────────────────────────── -->
<div id="mc-mobile">

  <!-- ── Banners condicionais (dentro do flex column) ──────────── -->
  <div id="banner-offline" class="mc-banner">
    <span>📵</span>
    <span id="banner-offline-texto">Você está offline.</span>
    <a id="banner-offline-caixa" href="javascript:void(0)">Horário caixa</a>
  </div>
  <div id="banner-trial" class="mc-banner">
    <span>⏳</span>
    <span id="banner-trial-texto">Período de teste ativo.</span>
    <a href="javascript:void(0)" onclick="window._irParaConfiguracoes?.('assinatura')">Ver Planos</a>
  </div>
  <div id="banner-expirado" class="mc-banner">
    <span>⚠️</span>
    <span>Período gratuito expirado.</span>
    <a href="javascript:void(0)" onclick="window._irParaConfiguracoes?.('assinatura')">Assinar</a>
  </div>
  <div id="banner-suspenso" class="mc-banner">
    <span>🔒</span>
    <span>Conta suspensa. Regularize para continuar.</span>
  </div>
  <div id="banner-manutencao" class="mc-banner">
    <span>🔧</span>
    <span id="banner-manutencao-texto">Sistema em manutenção.</span>
  </div>

  <!-- Header compacto 52px -->
  <header id="mc-header-mobile">
    <div id="mc-logo-mobile">
      <img src="icons/icon-192.png" alt="MeuCaixa" onerror="this.style.display='none'" />
      <span id="mc-logo-texto-mobile">MeuCaixa</span>
    </div>

    <!-- Badge de conexão -->
    <div id="mc-badge-conexao" class="online">Online</div>

    <!-- Sino de notificações -->
    <div id="sino-container"></div>

    <!-- Avatar compacto (abre drawer) -->
    <button id="mc-avatar-mobile" aria-label="Abrir menu">U</button>
  </header>

  <!-- Área de conteúdo principal -->
  <main id="conteudo-principal" role="main" aria-live="polite">
    <!-- Módulos injetados pelo router.navigate() -->
  </main>

  <!-- Tab bar fixa (5 itens) -->
  <nav id="mc-tab-bar" role="tablist" aria-label="Navegação principal">
    <button class="mc-tab-item ativo" data-rota="dashboard" role="tab" aria-label="Home">
      <span class="mc-tab-icone">🏠</span>
      <span class="mc-tab-label">Home</span>
    </button>
    <button class="mc-tab-item" data-rota="caixa" role="tab" aria-label="Caixa">
      <span class="mc-tab-icone">💰</span>
      <span class="mc-tab-label">Caixa</span>
    </button>
    <button class="mc-tab-item" data-rota="vendas" role="tab" aria-label="Vendas">
      <span class="mc-tab-icone">🛒</span>
      <span class="mc-tab-label">Vendas</span>
    </button>
    <button class="mc-tab-item" data-rota="estoque" role="tab" aria-label="Estoque">
      <span class="mc-tab-icone">📦</span>
      <span class="mc-tab-label">Estoque</span>
    </button>
    <button class="mc-tab-item" id="mc-tab-mais" role="tab" aria-label="Mais">
      <span class="mc-tab-icone">☰</span>
      <span class="mc-tab-label">Mais</span>
    </button>
  </nav>

</div>

<!-- ── Drawer lateral (fora do #mc-mobile, fixed) ───────────────── -->
<div id="mc-drawer-overlay">
  <div id="mc-drawer" role="dialog" aria-modal="true" aria-label="Menu completo">

    <!-- Cabeçalho do drawer -->
    <div id="mc-drawer-header">
      <div id="mc-drawer-nome">Usuário</div>
      <div id="mc-drawer-empresa">Empresa</div>
      <button id="mc-drawer-fechar" aria-label="Fechar menu">✕</button>
    </div>

    <!-- Itens do drawer (gerados por router.getMenuItems()) -->
    <ul id="mc-drawer-menu" role="menu">
      <!-- Populado por iniciarRouter() com itens do perfil -->
    </ul>

    <!-- Footer do drawer -->
    <div id="mc-drawer-footer">
      <button id="mc-drawer-logout" data-acao="logout">
        ↩️ Sair do sistema
      </button>
    </div>

  </div>
</div>
