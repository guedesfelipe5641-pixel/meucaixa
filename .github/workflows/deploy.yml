name: Deploy MeuCaixa

on:
  workflow_dispatch:
    inputs:
      alvo:
        description: 'O que fazer deploy'
        required: true
        default: 'hosting'
        type: choice
        options:
          - hosting
          - functions
          - rules
          - tudo

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Instalar dependências das Functions
        run: npm install --prefix functions

      - name: Deploy — Hosting
        if: ${{ github.event.inputs.alvo == 'hosting' }}
        run: firebase deploy --only hosting --token "$FIREBASE_TOKEN" --project meucaixa-prod --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy — Functions
        if: ${{ github.event.inputs.alvo == 'functions' }}
        run: firebase deploy --only functions --token "$FIREBASE_TOKEN" --project meucaixa-prod --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy — Rules
        if: ${{ github.event.inputs.alvo == 'rules' }}
        run: firebase deploy --only firestore:rules,storage --token "$FIREBASE_TOKEN" --project meucaixa-prod --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy — Tudo
        if: ${{ github.event.inputs.alvo == 'tudo' }}
        run: firebase deploy --token "$FIREBASE_TOKEN" --project meucaixa-prod --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
