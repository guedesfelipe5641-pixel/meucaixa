<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Meu Caixa Digital</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6B3520">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MeuCaixa">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(160deg,#6B3520 0%,#3A1A12 100%)}
    .spinner{width:40px;height:40px;border:3px solid rgba(240,163,53,.2);
      border-top-color:#F0A335;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="spinner"></div>
  <script type="module">
    import { auth } from "/firebase-config.js";
    import { onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const timer = setTimeout(() => {
      window.location.replace("/login.html");
    }, 5000);

    onAuthStateChanged(auth, user => {
      clearTimeout(timer);
      window.location.replace(user ? "/app.html" : "/login.html");
    });
  </script>
</body>
</html>
