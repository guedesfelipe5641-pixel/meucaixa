<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6B3520" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Meu Caixa Digital</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="components.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: #6B3520;
      overflow: hidden;
    }

    /* ── Splash screen ─────────────────────────────────────────── */
    #mc-splash {
      position: fixed;
      inset: 0;
      background: var(--primary, #6B3520);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 99999;
      transition: opacity .4s ease, visibility .4s ease;
    }
    #mc-splash.oculto {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    #mc-splash-logo {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.30);
    }
    #mc-splash-titulo {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: #fff;
      letter-spacing: .3px;
    }
    #mc-splash-empresa {
      font-size: 14px;
      color: rgba(255,255,255,.70);
      font-weight: 500;
    }
    #mc-splash-loader {
      width: 40px;
      height: 4px;
      background: rgba(255,255,255,.25);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }
    #mc-splash-loader::after {
      content: "";
      display: block;
      width: 40%;
      height: 100%;
      background: rgba(255,255,255,.75);
      border-radius: 2px;
      animation: mcSplashSlide 1.2s infinite ease-in-out;
    }
    @keyframes mcSplashSlide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* ── Shell (oculto durante o splash) ───────────────────────── */
    #shell {
      height: 100vh;
      height: 100dvh;
      opacity: 0;
      transition: opacity .35s ease;
      background: var(--bg, #FDF8F0);
    }
    #shell.visivel {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- ── Splash screen ─────────────────────────────────────────── -->
  <div id="mc-splash">
    <img id="mc-splash-logo" src="icons/icon-192.png"
         alt="MeuCaixa" onerror="this.style.display='none'" />
    <span id="mc-splash-titulo">MeuCaixa</span>
    <span id="mc-splash-empresa">Carregando...</span>
    <div id="mc-splash-loader"></div>
  </div>

  <!-- ── Shell principal (template injetado aqui) ──────────────── -->
  <div id="shell"></div>

  <!-- Versão de build para cache-bust de módulos JS lazy-loaded -->
  <script>window._MC_V = "?_=" + Date.now();</script>

  <!-- ── Script principal (ES Module) ─────────────────────────── -->
  <script type="module">
    // ── Imports ────────────────────────────────────────────────────
    import { onAuthChange, calcularAcesso, logout, getSessao, atualizarDadosEmpresa, VERSAO_APP }
      from "./auth.js";
    import { aplicarTemaGlobal, aplicarTemaDashboard }
      from "./theme.js";
    import { limparNotificacoesExpiradas, notificar }
      from "./notificacoes.js";

    // Expor notificar globalmente para debug/testes via console
    window.notificar = notificar;
    import { verificarModoLeitura }
      from "./planGuard.js";
    // router.js importado dinamicamente com cache-bust para garantir versão nova a cada deploy
    const { iniciarRouter, navigate } = await import("./router.js" + window._MC_V);
    import { registrarErro }
      from "./utils.js";

    // Importações Firebase (necessárias para onSnapshot de comunicados)
    import { db }
      from "./firebase-config.js";
    import { doc, getDoc, onSnapshot }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Versão local — fonte única de verdade vinda de auth.js
    const VERSAO_LOCAL = VERSAO_APP;

    // ── Listener de atualização via Service Worker ─────────────────
    // Quando o novo SW ativa (após deploy), ele envia SW_UPDATED para
    // todas as abas abertas. O banner aparece automaticamente sem que
    // o desenvolvedor precise atualizar o Firestore manualmente.
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.addEventListener("message", (e) => {
        if (e.data?.type === "SW_UPDATED") {
          _exibirBannerUpdate("O MeuCaixa foi atualizado. Recarregue para aplicar as novidades.");
        }
      });
    }

    // ── PASSO 1: Splash com nomeEmpresa do cache ──────────────────
    const cacheLocal = (() => {
      try { return JSON.parse(localStorage.getItem("mc_sessao")); } catch { return null; }
    })();

    const elEmpresaSplash = document.getElementById("mc-splash-empresa");
    if (cacheLocal?.nomeEmpresa) {
      elEmpresaSplash.textContent = cacheLocal.nomeEmpresa;
    }
    // EC-01: sem nomeEmpresa no cache → fallback genérico, sem quebrar

    // ── PASSO 2: onAuthChange — verificar sessão ──────────────────
    onAuthChange(async (sessao) => {
      if (!sessao) {
        // Não autenticado → limpar cache local e redirecionar para login
        // Sem limpar mc_sessao, login.html auto-redireciona para cá e cria loop infinito
        localStorage.removeItem("mc_sessao");
        localStorage.removeItem("mc_kit_offline");
        window.location.replace("login.html");
        return;
      }

      // EC-05: superAdmin → redirecionar para painel FSG
      if (sessao.superAdmin) {
        window.location.replace("admin-fsg.html");
        return;
      }

      // Expor sessão globalmente para outros módulos
      window._sessao     = sessao;
      window._empresaId  = sessao.empresaId;

      try {
        await _inicializarApp(sessao);
      } catch (e) {
        registrarErro("app", e?.message || String(e), "app.html");
        // Mesmo com erro, tenta revelar o app
        _revelarApp();
      }
    });

    // ── SEQUÊNCIA COMPLETA DE CARREGAMENTO ────────────────────────
    async function _inicializarApp(sessao) {

      // PASSO 3: detectar layout (auto/forçado)
      // EC-06: < 768 → mobile, >= 768 → desktop
      const layoutForcado = sessao.layoutForcado || "auto";
      if (layoutForcado === "mobile") {
        window._layoutMobile = true;
      } else if (layoutForcado === "desktop") {
        window._layoutMobile = false;
      } else {
        // Auto: baseado na largura atual
        window._layoutMobile = window.innerWidth < 768;
      }

      // Reavaliar layout no resize (auto apenas)
      if (layoutForcado === "auto") {
        window.addEventListener("resize", () => {
          window._layoutMobile = window.innerWidth < 768;
        });
      }

      // PASSO 4: carregar e injetar template correto
      const templateArq = window._layoutMobile ? "mobile" : "desktop";
      try {
        const html = await fetch(`/templates/${templateArq}.html`).then(r => r.text());
        document.getElementById("shell").innerHTML = html;
      } catch (e) {
        registrarErro("template", e?.message, "app.html");
        // Fallback: shell mínimo para não bloquear o app
        document.getElementById("shell").innerHTML =
          `<div id="conteudo-principal" style="padding:24px"></div>`;
      }

      // PASSO 5: aplicar tema global (Padrão no :root) + tema do dashboard
      aplicarTemaGlobal();
      aplicarTemaDashboard(sessao.temaVisual || "padrao", sessao.plano);

      // PASSO 6: limpar notificações expiradas
      limparNotificacoesExpiradas();

      // PASSO 7: verificar sistema/config (manutenção)
      await _verificarManutencao(sessao);

      // PASSO 8: calcularAcesso → banners e modoLeitura
      _configurarBanners(sessao);
      verificarModoLeitura();
      _iniciarRefreshTrial(sessao);

      // PASSO 9: gerar navegação via router
      iniciarRouter(sessao);

      // Configurar badge de conexão em tempo real (FR-011, SC-006)
      _configurarBadgeConexao();

      // PASSO 10: verificar abertura automática de caixa
      _verificarAberturaAutomaticaCaixa(sessao);

      // PASSO 11: onSnapshot em sistema/comunicados/{empresaId}
      _escutarComunicados(sessao);
      _escutarAtualizacoes();

      // PASSO 12: ocultar splash → revelar app
      _revelarApp();

      // PASSO 12.5: verificar retorno do Stripe (?checkout=success/cancel)
      _verificarRetornoStripe();

      // PASSO 13: navegar para rota inicial
      const hashRota = window.location.hash.replace("#", "");
      const rotaInicial = hashRota || "dashboard";
      await navigate(rotaInicial);

      // PASSO 14: inicializar syncManager (import lazy)
      try {
        const { syncManager } = await import("./syncManager.js" + window._MC_V);
        await syncManager.inicializar(sessao.empresaId, sessao.perfil, sessao.plano);
        window._syncManager = syncManager;
      } catch (e) {
        registrarErro("sync", e?.message || String(e), "app.html");
      }
    }

    // ── PASSO 7: Verificar manutenção ─────────────────────────────
    async function _verificarManutencao(sessao) {
      try {
        const configRef  = doc(db, "sistema", "config");
        const configSnap = await getDoc(configRef);
        if (!configSnap.exists()) return;

        const config = configSnap.data();
        if (config.manutencaoAtiva) {
          // EC-04: manutenção tem prioridade máxima
          const elTexto = document.getElementById("banner-manutencao-texto");
          if (elTexto && config.textoManutencao) {
            elTexto.textContent = config.textoManutencao;
          }
          _mostrarBanner("banner-manutencao");

          // modoLeitura global ativado pelo admin FSG
          if (config.modoLeituraGlobal) {
            // Trata como somente_leitura independente do acesso individual
            window._modoLeituraGlobal = true;
          }
        }
      } catch {
        // EC-07: falha silenciosa (pode ser offline)
      }
    }

    // ── PASSO 8: Configurar banners condicionais ─────────────────
    // Recalcula acesso e diasTrial em tempo real (não usa sessao.acesso em cache
    // para detectar corretamente expiração de trial em sessões abertas por dias).
    function _configurarBanners(sessao) {
      const agora           = Date.now();
      const assinaturaAtiva = sessao.assinaturaAtiva;
      const status          = sessao.status;
      const trialExpira     = sessao.trialExpira || 0;

      // Recalcular acesso ao vivo
      let acesso;
      if (status === "suspenso") {
        const suspensaoEm = sessao.suspensaoEm || agora;
        acesso = ((agora - suspensaoEm) / (1000 * 60 * 60)) <= 48 ? "ativo" : "somente_leitura";
      } else if (assinaturaAtiva === true) {
        acesso = "ativo";
      } else if (status === "cancelado") {
        acesso = "somente_leitura";
      } else {
        acesso = (!trialExpira || agora <= trialExpira) ? "ativo" : "somente_leitura";
      }

      const diasTrial = trialExpira
        ? Math.max(0, Math.ceil((trialExpira - agora) / 86400000))
        : 0;

      // Limpar banners de status antes de re-renderizar (suporte a refresh periódico)
      ["banner-trial", "banner-expirado", "banner-suspenso"].forEach(id => _ocultarBanner(id));

      // Banner offline (atualiza via eventos de rede — ver _configurarBadgeConexao)
      if (!navigator.onLine) _mostrarBanner("banner-offline");

      // Banner trial ativo
      if (!assinaturaAtiva && acesso === "ativo" && status !== "suspenso") {
        const elTrial = document.getElementById("banner-trial-texto");
        if (elTrial) {
          elTrial.textContent = diasTrial === 1
            ? "Período de teste: 1 dia restante."
            : `Período de teste: ${diasTrial} dias restantes.`;
        }
        _mostrarBanner("banner-trial");
      }

      // Banner trial expirado
      if (acesso === "somente_leitura" && !assinaturaAtiva && status !== "suspenso" && status !== "cancelado") {
        _mostrarBanner("banner-expirado");
      }

      // Banner suspenso
      if (status === "suspenso") {
        _mostrarBanner("banner-suspenso");
      }

      // Banner cancelado (reutiliza banner-expirado com texto ajustado)
      if (status === "cancelado") {
        const el = document.getElementById("banner-expirado");
        const elSpan = el?.querySelectorAll("span")[1];
        if (elSpan) elSpan.textContent = "Assinatura cancelada. Seus dados estão preservados.";
        _mostrarBanner("banner-expirado");
      }

      return acesso; // para uso pelo refresh periódico
    }

    // Refresh em tempo real: onSnapshot detecta mudança de trialExpira/status no Firestore
    // (ex: admin altera via console). Intervalo de 5min mantém contador de dias preciso.
    function _iniciarRefreshTrial(sessao) {
      // onSnapshot escuta o documento da empresa para todos os usuários:
      // - Propaga mudanças de plano em tempo real (ex: upgrade/downgrade via Stripe)
      // - Atualiza banners de trial/suspensão sem precisar recarregar a página
      const empresaRef = doc(db, "empresas", sessao.empresaId);
      window._unsubscribeEmpresa = onSnapshot(empresaRef, (snap) => {
        if (!snap.exists()) return;
        const dados = snap.data();

        // Propagar plano/status/assinaturaAtiva/trialExpira para sessao e router
        const rawTs = dados.trialExpira;
        const trialExpiraMs = rawTs?.toMillis ? rawTs.toMillis() : (rawTs || 0);
        atualizarDadosEmpresa({
          plano:           dados.plano,
          status:          dados.status,
          assinaturaAtiva: dados.assinaturaAtiva,
          trialExpira:     trialExpiraMs,
        });

        // Atualizar campos de trial no objeto sessao local (para banners)
        sessao.trialExpira     = trialExpiraMs;
        sessao.assinaturaAtiva = dados.assinaturaAtiva;
        sessao.status          = dados.status;
        const acessoAtual = _configurarBanners(sessao);
        if (acessoAtual === "somente_leitura") {
          verificarModoLeitura();
        }
      });

      // Intervalo de 5min para atualizar contador de dias mesmo sem mudança no Firestore
      setInterval(() => _configurarBanners(sessao), 5 * 60 * 1000);
    }

    // ── PASSO 10: Abertura automática de caixa ────────────────────
    function _verificarAberturaAutomaticaCaixa(sessao) {
      try {
        const kitRaw = localStorage.getItem("mc_kit_offline");
        if (!kitRaw) return;
        const kit = JSON.parse(kitRaw);
        const cfg = kit?.configuracaoCaixa;
        if (!cfg?.autoAbrir || !cfg?.horaAbertura) return;

        const agora    = new Date();
        const [hh, mm] = cfg.horaAbertura.split(":").map(Number);
        const alvo     = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate(), hh, mm, 0);
        const diasSemana = cfg.diasSemana || [0,1,2,3,4,5,6];
        const diaAtual   = agora.getDay();

        if (!diasSemana.includes(diaAtual)) return;

        const diff = alvo.getTime() - agora.getTime();

        if (diff > 0 && diff <= 3600000) {
          // Abre em até 1h → agenda setTimeout
          setTimeout(async () => {
            try {
              const { renderizar } = await import("./modulos/caixa.js");
              // Dispara evento de abertura automática
              document.dispatchEvent(new CustomEvent("mc:abrirCaixaAutomatico", {
                detail: { hora: cfg.horaAbertura }
              }));
            } catch { /* módulo ainda não implementado */ }
          }, diff);
        } else if (diff <= 0 && diff >= -60000) {
          // Tolerância ±60s: abrir agora
          document.dispatchEvent(new CustomEvent("mc:abrirCaixaAutomatico", {
            detail: { hora: cfg.horaAbertura }
          }));
        }
      } catch {
        // Silencioso — não bloquear carregamento
      }
    }

    // ── PASSO 11: onSnapshot de comunicados ──────────────────────
    function _escutarComunicados(sessao) {
      if (!sessao?.empresaId) return;
      try {
        const refComunicado = doc(db, "comunicados", sessao.empresaId);
        onSnapshot(refComunicado, (snap) => {
          if (!snap.exists()) return;
          const dados = snap.data();
          if (!dados?.mensagem) return;
          // Notificar via evento para o dashboard exibir em destaque
          document.dispatchEvent(new CustomEvent("mc:comunicadoFSG", {
            detail: dados
          }));
        });
      } catch {
        // EC-07: falha silenciosa offline
      }
    }

    // ── PASSO 11b: Listener de versão / update ───────────────────
    function _escutarAtualizacoes() {
      if (window._unsubscribeConfig) {
        window._unsubscribeConfig();
        window._unsubscribeConfig = null;
      }

      const configRef = doc(db, "sistema", "config");

      window._unsubscribeConfig = onSnapshot(
        configRef,
        { includeMetadataChanges: false },
        (snap) => {
          if (!snap.exists()) return;
          const {
            versaoAppAtual, versaoAppMinima, mensagemUpdate, updateCritico,
            manutencaoAtiva, manutencaoTexto, modoLeituraGlobal,
          } = snap.data();

          // ── Manutenção mid-session ─────────────────────────────
          // Admin FSG pode ativar/desativar manutenção sem que usuários
          // precisem recarregar — onSnapshot propaga em tempo real.
          if (manutencaoAtiva) {
            const elTexto = document.getElementById("banner-manutencao-texto");
            if (elTexto && manutencaoTexto) elTexto.textContent = manutencaoTexto;
            _mostrarBanner("banner-manutencao");
            if (modoLeituraGlobal) {
              window._modoLeituraGlobal = true;
              verificarModoLeitura();
            }
          } else {
            _ocultarBanner("banner-manutencao");
            if (window._modoLeituraGlobal) {
              window._modoLeituraGlobal = false;
            }
          }

          // ── Verificação de versão ─────────────────────────────
          if (!versaoAppAtual) return;

          const versaoNova         = _versaoMaiorQue(versaoAppAtual, VERSAO_LOCAL);
          const versaoAbaixoMinima = versaoAppMinima
            ? _versaoMaiorQue(versaoAppMinima, VERSAO_LOCAL)
            : false;

          if (versaoAbaixoMinima || updateCritico) {
            _removerBannerUpdate();
            notificar(
              "bloqueio",
              "Atualização obrigatória",
              mensagemUpdate || "Uma atualização crítica está disponível. Recarregue para continuar.",
              {
                autoClose:  false,
                labelBotao: "Atualizar agora",
                onConfirm:  () => window.location.reload(),
              }
            );
            return;
          }

          if (versaoNova) {
            _exibirBannerUpdate(mensagemUpdate || "Uma nova versão do MeuCaixa está disponível.");
          }
        },
        (error) => {
          console.error("[update-check] onSnapshot sistema/config falhou:", error.code);
        }
      );
    }

    function _exibirBannerUpdate(mensagem) {
      _removerBannerUpdate();

      const banner = document.createElement("div");
      banner.id = "mc-update-banner";
      banner.className = "mc-update-banner";
      banner.innerHTML = `
        <span class="mc-update-banner__texto">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="1 4 1 10 7 10"></polyline>
            <path d="M3.51 15a9 9 0 1 0 .49-3.51"></path>
          </svg>
          ${mensagem}
        </span>
        <div class="mc-update-banner__acoes">
          <button class="mc-update-banner__btn mc-update-banner__btn--primario"
                  id="mc-update-agora">Atualizar agora</button>
          <button class="mc-update-banner__btn mc-update-banner__btn--secundario"
                  id="mc-update-depois">Depois</button>
        </div>
      `;

      document.body.insertBefore(banner, document.body.firstChild);
      document.body.classList.add("mc-tem-banner-update");

      // Medir altura real do banner (varia em mobile por flex-direction:column)
      const _atualizarAlturaBanner = () => {
        document.body.style.setProperty("--mc-banner-h", banner.offsetHeight + "px");
      };
      _atualizarAlturaBanner();
      banner._ro = new ResizeObserver(_atualizarAlturaBanner);
      banner._ro.observe(banner);

      document.getElementById("mc-update-agora").addEventListener("click", () => {
        window.location.reload();
      });
      document.getElementById("mc-update-depois").addEventListener("click", () => {
        _removerBannerUpdate();
      });
    }

    function _removerBannerUpdate() {
      const b = document.getElementById("mc-update-banner");
      b?._ro?.disconnect();
      b?.remove();
      document.body.classList.remove("mc-tem-banner-update");
      document.body.style.removeProperty("--mc-banner-h");
    }

    function _versaoMaiorQue(versaoA, versaoB) {
      const parse = (v) => {
        const m = String(v).match(/^(\d+)\.(\d+)\.(\d+)/);
        return m ? [+m[1], +m[2], +m[3]] : [0, 0, 0];
      };
      const [ma, mia, pa] = parse(versaoA);
      const [mb, mib, pb] = parse(versaoB);
      if (ma !== mb)   return ma  > mb;
      if (mia !== mib) return mia > mib;
      return pa > pb;
    }

    // ── PASSO 12: Revelar app (ocultar splash) ────────────────────
    function _revelarApp() {
      const splash = document.getElementById("mc-splash");
      const shell  = document.getElementById("shell");
      if (splash) splash.classList.add("oculto");
      if (shell)  shell.classList.add("visivel");
    }

    // ── Badge de conexão em tempo real ───────────────────────────
    function _configurarBadgeConexao() {
      const atualizar = () => {
        const online = navigator.onLine;

        // Header badges
        document.querySelectorAll("#mc-badge-conexao").forEach(el => {
          el.textContent = online ? "Online" : "Offline";
          el.className   = online ? "online" : "offline";
        });

        // Footer status
        document.querySelectorAll("#mc-footer-status").forEach(el => {
          el.textContent = online ? "● Online" : "● Offline";
          el.className   = online ? "online" : "offline";
        });

        // Banners offline
        if (online) {
          _ocultarBanner("banner-offline");
        } else {
          // Tenta obter horário de fechamento do caixa do kit offline
          try {
            const kit = JSON.parse(localStorage.getItem("mc_kit_offline") || "{}");
            const hora = kit?.configuracaoCaixa?.horaFechamento || "";
            const elTexto = document.getElementById("banner-offline-texto");
            if (elTexto) {
              elTexto.textContent = hora
                ? `Você está offline. Caixa fecha às ${hora}.`
                : "Você está offline. Algumas funções podem estar indisponíveis.";
            }
          } catch { /* silencioso */ }
          _mostrarBanner("banner-offline");
        }
      };

      window.addEventListener("online",  atualizar);
      window.addEventListener("offline", atualizar);
      atualizar(); // estado inicial
    }

    // ── STRIPE: verificar retorno de checkout ────────────────────
    function _verificarRetornoStripe() {
      const params   = new URLSearchParams(window.location.search);
      const checkout = params.get("checkout");
      if (!checkout) return;

      params.delete("checkout");
      const novaUrl = window.location.pathname +
        (params.toString() ? "?" + params.toString() : "") +
        window.location.hash;
      history.replaceState(null, "", novaUrl);

      if (checkout === "success") {
        notificar("sucesso", "Pagamento confirmado!", "Sua assinatura está sendo ativada. Em instantes seu plano será atualizado.");
      } else if (checkout === "cancel") {
        notificar("aviso", "Pagamento cancelado", "Você pode tentar novamente quando quiser.");
      }
    }

    // ── Helpers de banner ────────────────────────────────────────
    function _mostrarBanner(id) {
      document.getElementById(id)?.classList.add("visivel");
    }
    function _ocultarBanner(id) {
      document.getElementById(id)?.classList.remove("visivel");
    }
  </script>

</body>
